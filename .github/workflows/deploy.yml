name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 for better performance/security

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # Note: PHP 8.4 is the current stable high version. 
          # 8.5 is experimental/dev as of early 2026.
          php-version: '8.5' 
          extensions: mbstring, xml, ctype, iconv, mysql, zip
          coverage: xdebug

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Deploy
        run: |
          # Commands to deploy your application
          echo "Deploying application..."