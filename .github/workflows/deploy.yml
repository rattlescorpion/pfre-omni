name: Deploy

on:
  push:
    branches:
      - main

# Global environment variables
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 for better performance/security

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysqli, pdo_mysql, zip
          coverage: xdebug

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Deploy application
        run: |
          echo "Deploying application..."
          # Add your real deployment commands below
          # e.g. php artisan migrate --force
          # e.g. rsync -avz ./ user@server:/path/to/app