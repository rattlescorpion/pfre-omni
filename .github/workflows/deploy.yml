name: PFRE Omni — CI/CD Pipeline

on:
  push:
    branches:
      - main        # Auto-deploy to production
      - staging     # Auto-deploy to staging
  pull_request:
    branches:
      - main
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Environment defaults
# ---------------------------------------------------------------------------
env:
  PHP_VERSION: "8.2"
  NODE_VERSION: "20"
  COMPOSER_FLAGS: "--no-interaction --no-ansi --prefer-dist"

# ===========================================================================
# JOB 1 — CODE QUALITY & TESTS
# ===========================================================================
jobs:
  test:
    name: "🧪 Test (PHP ${{ matrix.php }})"
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: pfre_omni_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: >-
            mbstring, pdo, pdo_mysql, redis, gd, exif, intl,
            bcmath, zip, soap, curl, fileinfo, pcntl
          coverage: xdebug
          tools: composer:v2

      - name: 🗂️  Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: 📦 Install Composer dependencies
        run: composer install ${{ env.COMPOSER_FLAGS }} --no-scripts

      - name: 🟢 Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️  Build frontend assets
        run: npm run build

      - name: ⚙️  Prepare .env for testing
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=pfre_omni_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=secret/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/CACHE_DRIVER=.*/CACHE_DRIVER=redis/' .env
          sed -i 's/QUEUE_CONNECTION=.*/QUEUE_CONNECTION=redis/' .env

      - name: 🗄️  Run migrations
        run: php artisan migrate --force

      - name: 🌱 Run database seeders
        run: php artisan db:seed --force

      - name: 🔍 PHP Lint (syntax check)
        run: find app config database routes tests -name "*.php" | xargs php -l

      - name: 🎨 Laravel Pint (code style)
        run: vendor/bin/pint --test

      - name: 🧪 Run PHPUnit tests
        run: |
          vendor/bin/phpunit \
            --coverage-clover coverage.xml \
            --log-junit test-results.xml \
            --colors=always
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: pfre_omni_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-php${{ matrix.php }}
          path: |
            test-results.xml
            coverage.xml

  # ===========================================================================
  # JOB 2 — SECURITY AUDIT
  # ===========================================================================
  security:
    name: "🔒 Security Audit"
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: 🗂️  Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ env.PHP_VERSION }}-${{ hashFiles('**/composer.lock') }}

      - name: 📦 Install dependencies
        run: composer install ${{ env.COMPOSER_FLAGS }} --no-scripts

      - name: 🔐 Composer security audit
        run: composer audit

      - name: 🔐 NPM audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ===========================================================================
  # JOB 3 — DEPLOY TO STAGING
  # ===========================================================================
  deploy-staging:
    name: "🚀 Deploy → Staging"
    runs-on: ubuntu-22.04
    needs: [test, security]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install Composer (production)
        run: composer install ${{ env.COMPOSER_FLAGS }} --no-dev --optimize-autoloader

      - name: 📦 Install NPM & Build
        run: |
          npm ci
          npm run build

      - name: 📂 Sync files to staging server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.STAGING_HOST }}
          REMOTE_USER: ${{ secrets.STAGING_USER }}
          REMOTE_PORT: ${{ secrets.STAGING_PORT || 22 }}
          SOURCE: "./"
          TARGET: ${{ secrets.STAGING_DEPLOY_PATH }}
          EXCLUDE: ".git, .github, node_modules, .env, storage/logs, storage/framework/cache"

      - name: ⚙️  Post-deploy artisan commands (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script: |
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            php artisan down --retry=30
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan queue:restart
            php artisan up
            echo "✅ Staging deploy complete — $(date)"

      - name: 💬 Notify staging deploy
        if: always()
        run: |
          echo "Staging deploy ${{ job.status }} for commit ${{ github.sha }}"

  # ===========================================================================
  # JOB 4 — DEPLOY TO PRODUCTION
  # ===========================================================================
  deploy-production:
    name: "🚀 Deploy → Production"
    runs-on: ubuntu-22.04
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install Composer (production)
        run: composer install ${{ env.COMPOSER_FLAGS }} --no-dev --optimize-autoloader

      - name: 📦 Install NPM & Build
        run: |
          npm ci
          npm run build

      - name: 📂 Sync files to production server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.PROD_HOST }}
          REMOTE_USER: ${{ secrets.PROD_USER }}
          REMOTE_PORT: ${{ secrets.PROD_PORT || 22 }}
          SOURCE: "./"
          TARGET: ${{ secrets.PROD_DEPLOY_PATH }}
          EXCLUDE: ".git, .github, node_modules, .env, storage/logs, storage/framework/cache"

      - name: ⚙️  Post-deploy artisan commands (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || 22 }}
          script: |
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            php artisan down --secret="${{ secrets.MAINTENANCE_BYPASS_KEY }}" --retry=60
            php artisan backup:run --only-db
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan icons:cache
            php artisan queue:restart
            php artisan horizon:terminate
            php artisan up
            echo "✅ Production deploy complete — $(date)"

      - name: 💬 Notify production deploy (WhatsApp / Slack)
        if: always()
        run: |
          echo "Production deploy ${{ job.status }} for ${{ github.actor }} — ${{ github.sha }}"

  # ===========================================================================
  # JOB 5 — NOTIFY ON FAILURE
  # ===========================================================================
  notify-failure:
    name: "📢 Notify on Failure"
    runs-on: ubuntu-22.04
    needs: [test, security, deploy-staging, deploy-production]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "Pipeline failed on branch ${{ github.ref }} by ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"