# ===========================================================================
# Property Finder Omni Platform — Docker Compose (Local Development)
# ===========================================================================

networks:
  pfre_network:
    driver: bridge

volumes:
  pfre_mysql_data:
    driver: local
  pfre_redis_data:
    driver: local
  pfre_storage:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # PHP 8.4 FPM Application Server
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      args:
        PHP_VERSION: "8.4"
    container_name: pfre_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - pfre_storage:/var/www/html/storage/app
      - .docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      PHP_OPCACHE_ENABLE: "0"
    networks:
      - pfre_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-v"]         # Simple PHP version check (always passes)
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Nginx Web Server
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: pfre_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
    volumes:
      - .:/var/www/html:ro
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - pfre_network
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # MySQL 8.0
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: pfre_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-pfre_omni}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - pfre_mysql_data:/var/lib/mysql
      - .docker/mysql/my.cnf:/etc/mysql/conf.d/pfre.cnf:ro
      - .docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - pfre_network
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --max-connections=200
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/slow.log
      --long-query-time=2
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 (Cache + Queue + Sessions)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pfre_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - pfre_redis_data:/data
      - .docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - pfre_network
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Laravel Horizon (Queue Worker Dashboard)
  # ---------------------------------------------------------------------------
  horizon:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: pfre_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - .docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    command: php artisan horizon
    networks:
      - pfre_network
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Laravel Scheduler (Cron — runs all 141 jobs)
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: pfre_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - .docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    networks:
      - pfre_network
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Vite Dev Server (Frontend HMR)
  # ---------------------------------------------------------------------------
  vite:
    image: node:20-alpine
    container_name: pfre_vite
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - pfre_network

  # ---------------------------------------------------------------------------
  # Mailpit (Local email testing — catches all outbound mail)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: pfre_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATA_FILE: /data/mailpit.db
    volumes:
      - .docker/mailpit:/data
    networks:
      - pfre_network

  # ---------------------------------------------------------------------------
  # phpMyAdmin (Database GUI — dev only)
  # ---------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pfre_phpmyadmin
    restart: unless-stopped
    ports:
      - 8080:80
    environment:
      PMA_HOST: mysql
      PMA_USER: '${DB_USERNAME}'
      PMA_PASSWORD: '${DB_PASSWORD}'
      UPLOAD_LIMIT: 128M
    networks:
      - pfre_network
    depends_on:
      mysql:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Redis Commander (Redis GUI — dev only)
  # ---------------------------------------------------------------------------
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: pfre_redis_commander
    restart: unless-stopped
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    environment:
      REDIS_HOSTS: "pfre_redis:redis:6379"
    networks:
      - pfre_network
    depends_on:
      redis:
        condition: service_healthy